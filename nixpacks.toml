[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt",
  "cd frontend && npm install && npm run build"
]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
```

> Note this version uses the **system pip** directly (no venv) — Railway containers are already isolated so a venv is unnecessary and causes path issues.

And update your `Procfile` to match (no venv path):
```
web: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
```

And add `uvicorn` explicitly to `backend/requirements.txt` if it's not already there:
```
uvicorn[standard]==0.29.0
